<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <link rel="manifest" href="manifest.json">
    <title>Sadaqah Jariyah</title>
    <script src="app.js" defer></script>
</head>
<body>
    <header>
        <h1>Sadaqah Jariyah</h1>
        <button id="toggle-dark-mode">Toggle Dark Mode</button>
    </header>
    <nav>
        <ul>
            <li><button onclick="showZikr('astaghfirullah')">Astaghfirullah</button></li>
            <li><button onclick="showZikr('awal_kalima')">Awal Kalima</button></li>
            <li><button onclick="showZikr('bismillah')">Bismillah</button></li>
        </ul>
    </nav>
    <main>
        <section id="zikr-section">
            <h2>Zikr</h2>
            <p id="zikr-text">Welcome to Zikr</p>
        </section>
        <section id="surah-muzammil">
            <h2>Surah Muzammil</h2>
            <p>[Surah Muzzamil text goes here]</p>
        </section>
        <section id="counters">
            <h2>Counters</h2>
            <p>Personal Counter: <span id="personal-counter">0</span></p>
            <p>Global Counter: <span id="global-counter">0</span></p>
        </section>
    </main>
    <footer>
        <p>Dedicated to Ashpak Momin</p>
        <p id="reminder"></p>
    </footer>
</body>
</html>
